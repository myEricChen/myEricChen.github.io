<!DOCTYPE html>
<html lang="{{lang}}"{{dir}}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{meta_description}}">
    <link rel="canonical" href="{{canonical_url}}">
