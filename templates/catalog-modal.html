    <!-- 下载目录模态框 -->
    <div id="catalogModal" class="modal-overlay" style="display: none;"{{modal_dir}}>
        <div class="modal-container">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>{{modal_title}}</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="catalogForm" action="https://submit-form.com/6LgD1nY1K" method="POST" target="_blank">
                        <input type="hidden" name="_redirect" value="https://www.ludatest.com/thank-you.html">
                        <input type="hidden" name="_email.subject" value="Catalog Download Request from Website">

                        <div class="form-group">
                            <label for="modal_name">{{modal_name_label}}</label>
                            <input type="text" id="modal_name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="modal_email">{{modal_email_label}}</label>
                            <input type="email" id="modal_email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="modal_company">{{modal_company_label}}</label>
                            <input type="text" id="modal_company" name="company">
                        </div>
                        <div class="form-group">
                            <label for="modal_country">{{modal_country_label}}</label>
                            <input type="text" id="modal_country" name="country">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">{{modal_submit}}</button>
                    </form>
                    <div id="catalogFormStatus" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></div>
                </div>
                <div class="modal-footer">
                    <p>{{modal_footer}}</p>
                </div>
            </div>
        </div>
    </div>
