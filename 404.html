    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8fafc; color: #1e2b37; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
        .logo { margin-bottom: 40px; }
        .logo img { height: 60px; }
        .error-code { font-size: 8rem; font-weight: 800; color: #d71920; line-height: 1; margin-bottom: 10px; }
        .error-title { font-size: 1.8rem; font-weight: 600; color: #0a2647; margin-bottom: 15px; }
        .error-message { font-size: 1.1rem; color: #4a6f8e; max-width: 500px; margin-bottom: 40px; line-height: 1.6; }
        .btn { display: inline-block; padding: 14px 36px; border-radius: 40px; font-weight: 600; text-decoration: none; transition: all 0.2s; border: 2px solid transparent; cursor: pointer; font-size: 1.05rem; }
        .btn-primary { background-color: #d71920; color: white; }
        .btn-primary:hover { background-color: #b0141a; }
        .btn-outline { background: transparent; color: #d71920; border-color: #d71920; margin-left: 15px; }
        .btn-outline:hover { background: #d71920; color: white; }
        .lang-links { margin-top: 50px; display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; }
        .lang-links a { color: #4a6f8e; text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
        .lang-links a:hover { color: #d71920; }
        .lang-links a i { margin-right: 5px; }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }

<body>

        <a href="/ar/index.html"><i class="fas fa-globe"></i> العربية</a>

    <script>
        (function() {
            var path = window.location.pathname;
            var msgs = {
                ar: 'قد تكون الصفحة التي تبحث عنها قد نُقلت أو أنها غير متاحة مؤقتًا. دعنا نساعدك في العثور على معدات الاختبار المناسبة.',
                es: 'Es posible que la página que busca haya sido movida o no esté disponible temporalmente. Permítanos ayudarle a encontrar el equipo de prueba adecuado.',
                fr: 'La page que vous recherchez a peut-être été déplacée ou est temporairement indisponible. Laissez-nous vous aider à trouver le bon équipement d\'essai.'
            };
            var match = path.match(/^\/([a-z]{2})\//);
            if (match && msgs[match[1]]) {
                document.getElementById('error-msg').textContent = msgs[match[1]];
            }
        })();
    </script>
