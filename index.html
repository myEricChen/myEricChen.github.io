<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Luda Instruments</title>
    <script>
        // 获取浏览器语言（例如 'en-US', 'fr-FR', 'es-ES', 'ar-SA'）
        var userLang = navigator.language || navigator.userLanguage;

        // 根据语言前缀决定跳转路径
        var langMap = {
            'fr': '/fr/index.html',
            'es': '/es/index.html',
            'ar': '/ar/index.html'
        };
        var langCode = userLang.split('-')[0]; // 取前两位
        var targetUrl = langMap[langCode] || '/en/index.html';

        // 执行跳转
        window.location.replace(targetUrl);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
